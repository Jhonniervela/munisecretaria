<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaría - Mesa de Partes</title>
    
    <!-- Frameworks y Estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <!-- LIBRERÍAS PDF (Orden correcto para compatibilidad) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.js"></script>

    <style>
        :root { --navy: #0f172a; --accent: #3b82f6; --success: #10b981; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: var(--navy); color: white; border-bottom: 4px solid var(--accent); padding: 1rem; }
        .card-pro { border: none; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; }
        .hidden { display: none; }
        .historial-item { border-left: 5px solid var(--success); background: white; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; transition: 0.3s; }
        .historial-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-box { border-radius: 15px; padding: 1.5rem; text-align: center; color: var(--navy); background: white; border: 1px solid #e2e8f0; height: 100%; }
        .progress { height: 10px; border-radius: 10px; margin-top: 10px; background: #e2e8f0; }
        .btn-pdf { background: #e11d48; color: white; border-radius: 10px; font-weight: bold; border: none; }
        .btn-pdf:hover { background: #be123c; color: white; }
        .user-badge { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="navbar-custom shadow-sm d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="fas fa-file-signature me-2"></i> Mesa de Partes Digital</h5>
    <div class="d-flex align-items-center gap-3">
        <div id="user-tag" class="user-badge"></div>
        <button class="btn btn-sm btn-outline-light border-0" onclick="cerrarSesionLocal()"><i class="fas fa-power-off"></i></button>
    </div>
</nav>

<div class="container mt-4">
    <!-- MÓDULO: REGISTRO DE PERFIL -->
    <div id="mod-perfil" class="card card-pro p-4 mx-auto" style="max-width: 500px;">
        <h4 class="text-center fw-bold mb-4">Configurar Identidad</h4>
        <input type="text" id="nombreSec" class="form-control mb-3 p-3" placeholder="Nombre Completo">
        <input type="number" id="dniSec" class="form-control mb-3 p-3" placeholder="DNI">
        <input type="password" id="passSec" class="form-control mb-4 p-3" placeholder="Clave de Firma Digital">
        <button class="btn btn-primary w-100 p-3 fw-bold rounded-3" onclick="guardarPerfil()">ACTIVAR SISTEMA</button>
    </div>

    <!-- MÓDULO: PANEL PRINCIPAL -->
    <div id="mod-registros" class="hidden">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="text-secondary fw-bold mb-0">RESUMEN DE ACTIVIDAD</h6>
            <button class="btn btn-pdf px-3 py-2" onclick="menuReporte()">
                <i class="fas fa-file-pdf me-2"></i>DESCARGAR REPORTE
            </button>
        </div>

        <!-- Estadísticas -->
        <div class="row g-3 mb-4 text-center">
            <div class="col-6 col-md-3">
                <div class="stat-box shadow-sm">
                    <h3 class="fw-bold text-primary mb-0" id="stat-firmas">0</h3>
                    <small class="text-muted fw-bold">FIRMADOS HOY</small>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-box shadow-sm">
                    <h3 class="fw-bold text-success mb-0" id="stat-folios">0</h3>
                    <small class="text-muted fw-bold">FOLIOS HOY</small>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="stat-box shadow-sm text-start">
                    <small class="fw-bold">PRODUCTIVIDAD DEL DÍA</small>
                    <div class="progress">
                        <div id="progreso-bar" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                    <small id="progreso-txt" style="font-size: 11px;" class="text-muted">Calculando...</small>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="card card-pro p-3 mb-4">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="inputBusqueda" class="form-control border-start-0" placeholder="Buscar por Expediente, Fecha o Secretaria..." onkeyup="filtrar()">
            </div>
        </div>

        <h6 class="text-secondary fw-bold mb-3"><i class="fas fa-history me-2"></i>HISTORIAL DE RECEPCIÓN</h6>
        <div id="lista-historial"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://secretaria-13b78-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let cacheDatos = []; 
    let cargandoInicial = true;

    // --- PERFIL ---
    db.ref('configuracion/perfil_secretaria').on('value', snap => {
        const data = snap.val();
        if(data) {
            document.getElementById('mod-perfil').classList.add('hidden');
            document.getElementById('mod-registros').classList.remove('hidden');
            document.getElementById('user-tag').innerHTML = `<i class="fas fa-user-circle me-1"></i> ${data.nombre}`;
            cargarHistorial();
        } else {
            document.getElementById('mod-perfil').classList.remove('hidden');
            document.getElementById('mod-registros').classList.add('hidden');
        }
    });

    function guardarPerfil() {
        const n = document.getElementById('nombreSec').value, d = document.getElementById('dniSec').value, p = document.getElementById('passSec').value;
        if(!n || !d || !p) return Swal.fire('Atención', 'Completa los campos', 'warning');
        db.ref('configuracion/perfil_secretaria').set({ nombre: n, dni: d, clave: p });
    }

    function cerrarSesionLocal() {
        Swal.fire({ title: '¿Cerrar?', showCancelButton: true, confirmButtonText: 'Salir' })
            .then(res => { if(res.isConfirmed) db.ref('configuracion/perfil_secretaria').remove(); });
    }

    // --- DATOS Y CONTADORES (CORREGIDO PARA FECHAS) ---
    function cargarHistorial() {
        db.ref('entregas').on('value', snap => {
            const list = document.getElementById('lista-historial');
            list.innerHTML = "";
            cacheDatos = []; 
            let fHoy = 0, folHoy = 0;
            
            // Normalización de fecha de hoy para comparación exacta
            const h = new Date();
            const hoy1 = `${h.getDate()}/${h.getMonth()+1}/${h.getFullYear()}`;
            const hoy2 = `${h.getDate().toString().padStart(2,'0')}/${(h.getMonth()+1).toString().padStart(2,'0')}/${h.getFullYear()}`;

            snap.forEach(child => {
                const item = child.val();
                if(item.estado === 'RECIBIDO') {
                    cacheDatos.push(item);
                    
                    const fItem = item.fecha_firma ? item.fecha_firma.trim() : "";
                    if(fItem === hoy1 || fItem === hoy2) { 
                        fHoy++; 
                        folHoy += parseInt(item.folios || 0); 
                    }
                    
                    list.innerHTML += `
                        <div class="historial-item shadow-sm">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1 fw-bold text-navy">${item.expediente}</h6>
                                    <div class="text-muted small">
                                        <i class="fas fa-file-alt me-1"></i>${item.folios} folios | 
                                        <i class="fas fa-user-edit me-1"></i>${item.nombre_secre || 'Admin'}
                                    </div>
                                </div>
                                <div class="text-end">
                                    <span class="badge bg-success-subtle text-success border border-success mb-1">RECIBIDO</span><br>
                                    <small class="text-muted" style="font-size: 0.75rem;">${item.fecha_firma} ${item.hora_firma}</small>
                                </div>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('stat-firmas').innerText = fHoy;
            document.getElementById('stat-folios').innerText = folHoy;
            actualizarMeta(fHoy);
        });
    }

    function actualizarMeta(firmados) {
        const meta = 20; 
        let porc = (firmados / meta) * 100;
        if (porc > 100) porc = 100;
        document.getElementById('progreso-bar').style.width = porc + "%";
        document.getElementById('progreso-txt').innerText = `${firmados} de ${meta} para la meta diaria`;
    }

    // --- REPORTES PDF (OPTIMIZADO W3SCHOOLS) ---
    async function menuReporte() {
        const { value: rango } = await Swal.fire({
            title: 'Exportar PDF',
            input: 'select',
            inputOptions: { 'dia': 'Hoy', 'semana': 'Semana', 'mes': 'Mes', 'todo': 'Todo' },
            showCancelButton: true
        });
        if (rango) generarPDF(rango);
    }

    function generarPDF(rango) {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const h = new Date();
            const hoyStr = `${h.getDate()}/${h.getMonth()+1}/${h.getFullYear()}`;

            let filtrados = cacheDatos.filter(d => {
                if(rango === 'dia') return d.fecha_firma === hoyStr;
                return true; // Simplificado para asegurar descarga
            });

            doc.setFontSize(16);
            doc.text("REPORTE MESA DE PARTES", 14, 20);
            
            const rows = filtrados.map(d => [d.fecha_firma, d.hora_firma, d.expediente, d.folios, d.nombre_secre]);
            
            doc.autoTable({
                startY: 30,
                head: [['Fecha', 'Hora', 'Exp.', 'Folios', 'Firma']],
                body: rows,
                headStyles: { fillColor: [15, 23, 42] }
            });

            doc.save(`Reporte_${Date.now()}.pdf`);
        } catch (e) {
            Swal.fire('Error', 'Intenta de nuevo', 'error');
        }
    }

    // --- NOTIFICACIONES ---
    db.ref('entregas').on('child_added', snap => {
        if (cargandoInicial) return;
        const n = snap.val();
        if (n.estado === 'PENDIENTE') {
            Swal.fire({ title: 'NUEVO INGRESO', text: `Exp: ${n.expediente}`, icon: 'info', toast: true, position: 'top-end', timer: 4000, showConfirmButton: false });
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
        }
    });
    setTimeout(() => { cargandoInicial = false; }, 3000);

    function filtrar() {
        const term = document.getElementById('inputBusqueda').value.toLowerCase();
        const items = document.getElementsByClassName('historial-item');
        Array.from(items).forEach(i => i.style.display = i.textContent.toLowerCase().includes(term) ? "block" : "none");
    }
</script>
</body>
</html>
